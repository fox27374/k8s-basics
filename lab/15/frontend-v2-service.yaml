# ClusterIP Service for frontend v2 — selects only version: v2 Pods, so the
# weighted split (see frontend-split-traefikservice.yaml) routes to one version per backend.
apiVersion: v1
kind: Service
metadata:
  name: frontend-v2
  namespace: shop
  labels:
    app: frontend
    version: v2
spec:
  type: ClusterIP
  selector:
    app: frontend
    version: v2
  ports:
    - name: http
      port: 80
      targetPort: 80
