apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: frontend
  namespace: shop
spec:
  entryPoints:
    - web                       # Traefik's HTTP entrypoint (:80) on k3s
  routes:
    - match: PathPrefix(`/`)
      kind: Rule
      services:
        - name: frontend        # the ClusterIP Service from frontend-service.yaml
          port: 80
