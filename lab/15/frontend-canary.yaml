# Canary: run frontend v2 (green) alongside v1 (blue) and split traffic by weight.
# Apply this on top of the frontend Deployment/Service + IngressRoute. It adds the
# v2 Deployment, a weighted TraefikService, and re-points the existing `frontend`
# IngressRoute at that weighted service.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-v2
  namespace: shop
  labels:
    app: frontend
    tier: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
      version: v2
  template:
    metadata:
      labels:
        app: frontend
        tier: web
        version: v2
    spec:
      containers:
        - name: frontend
          image: cr.lab.local/lab-frontend:v2   # in real life a genuinely new build; here COLOR differs
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          env:
            - name: COLOR
              value: green
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-v2
  namespace: shop
  labels:
    app: frontend
    version: v2
spec:
  type: ClusterIP
  selector:
    app: frontend
    version: v2
  ports:
    - name: http
      port: 80
      targetPort: 80
---
# The `frontend` Service is pinned to version: v1 and `frontend-v2` to version: v2,
# so each weighted backend below routes to exactly one version.
apiVersion: traefik.io/v1alpha1
kind: TraefikService
metadata:
  name: frontend-split
  namespace: shop
spec:
  weighted:
    services:
      - name: frontend          # v1 (blue)
        port: 80
        weight: 80
      - name: frontend-v2       # v2 (green)
        port: 80
        weight: 20
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: frontend                # same name re-points the existing route
  namespace: shop
spec:
  entryPoints:
    - web
  routes:
    - match: PathPrefix(`/`)
      kind: Rule
      services:
        - name: frontend-split
          kind: TraefikService
