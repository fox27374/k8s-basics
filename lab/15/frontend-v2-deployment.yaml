# Canary: frontend v2 (green), run alongside the v1 (blue) Deployment.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-v2
  namespace: shop
  labels:
    app: frontend
    tier: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
      version: v2
  template:
    metadata:
      labels:
        app: frontend
        tier: web
        version: v2
    spec:
      containers:
        - name: frontend
          image: cr.lab.local/lab-frontend:v2   # in real life a genuinely new build; here COLOR differs
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          env:
            - name: COLOR
              value: green
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 5
