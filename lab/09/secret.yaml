apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: shop
type: Opaque
# stringData lets you write plain text; Kubernetes base64-encodes it on apply.
# base64 is encoding, NOT encryption — anyone with read access can decode it.
stringData:
  POSTGRES_USER: shop
  POSTGRES_PASSWORD: s3cr3t-change-me
  POSTGRES_DB: shop
