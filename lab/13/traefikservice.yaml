# Weighted split across the two versions. `frontend` (v1/blue) and `frontend-v2`
# (v2/green) are each pinned to one version, so weights map cleanly to versions.
apiVersion: traefik.io/v1alpha1
kind: TraefikService
metadata:
  name: frontend-split
  namespace: shop
spec:
  weighted:
    services:
      - name: frontend          # v1 (blue)
        port: 80
        weight: 80
      - name: frontend-v2       # v2 (green)
        port: 80
        weight: 20
