apiVersion: v1
kind: Pod
metadata:
  name: oom-demo
  namespace: shop
  labels:
    app: oom-demo
spec:
  restartPolicy: Always
  containers:
    - name: stress
      image: cr.lab.local/polinux/stress
      # allocate 128Mi under a 32Mi limit -> the kernel OOM-kills the container
      command: ["stress", "--vm", "1", "--vm-bytes", "128M", "--vm-hang", "0"]
      resources:
        limits:
          memory: 32Mi
